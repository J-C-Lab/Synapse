name: Build Electron

# ============================================================================
# Electron Desktop Application Build (Windows x64)
# ============================================================================
# Builds the Windows x64 Electron desktop application — the only platform
# S11 Checkpoint R's release profile ships (see RELEASE_PROFILE in
# scripts/release-admission-gate.mjs). This workflow works OUT-OF-THE-BOX
# without requiring any secrets.
#
# OPTIONAL SECRETS (for Windows code signing - DISABLED by default):
# ----------------------------------------------------------------
#   - WINDOWS_CERTIFICATE: Base64-encoded PFX certificate
#   - WINDOWS_CERTIFICATE_PASSWORD: Certificate password
#
# CODE SIGNING IS DISABLED BY DEFAULT - Electron builds will be unsigned.
# ============================================================================

on:
  workflow_call:
    inputs:
      retain_unpacked:
        description: "Also upload the unpacked win-unpacked/ tree as a short-retention compat-* artifact (never a release input/asset)."
        type: boolean
        required: false
        default: false
  workflow_dispatch:
    inputs:
      retain_unpacked:
        description: "Also upload the unpacked win-unpacked/ tree as a short-retention compat-* artifact (never a release input/asset)."
        type: boolean
        required: false
        default: false

jobs:
  build-electron:
    name: Build Electron App (windows x64)

    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.0.8

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.x
          cache: pnpm

      # Resolve the exact electron version from package.json so the cache key
      # only invalidates when electron itself is bumped — not when an unrelated
      # dev dep changes pnpm-lock.yaml.
      - name: Resolve electron version
        id: electron-version
        shell: bash
        run: |
          v=$(node -p "require('./package.json').devDependencies.electron.replace(/^[\^~]/, '')")
          echo "version=$v" >> "$GITHUB_OUTPUT"

      # Cache Electron's downloaded Chromium binary and electron-builder's
      # bundled NSIS / WiX downloads so we don't re-fetch ~260 MB on every
      # CI run.
      #
      # NOTE: actions/cache uses minimatch internally, which requires forward
      # slashes even on Windows — backslash paths silently match nothing.
      - name: Cache Electron binaries
        uses: actions/cache@v6
        with:
          path: |
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: ${{ runner.os }}-electron-${{ steps.electron-version.outputs.version }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-${{ steps.electron-version.outputs.version }}-
            ${{ runner.os }}-electron-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build electron-vite app
        run: pnpm build

      - name: Verify electron-vite output
        shell: bash
        run: |
          test -f out/main/index.js || { echo "::error::out/main/index.js missing"; exit 1; }
          test -f out/preload/index.js || { echo "::error::out/preload/index.js missing"; exit 1; }
          test -f out/renderer/index.html || { echo "::error::out/renderer/index.html missing"; exit 1; }
          echo "electron-vite output OK ($(du -sh out/ | cut -f1))"

      # Code signing is OPTIONAL and DISABLED by default.
      # For production releases with signing, populate the env block below.
      - name: Build Electron app
        # env:
        #   # Optional: Windows code signing
        #   CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE }}
        #   CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec electron-builder --win --x64 --publish=never

      - name: Upload Windows artifacts (NSIS)
        uses: actions/upload-artifact@v7
        with:
          name: electron-windows-x64-nsis
          # latest.yml + .blockmap drive electron-updater (and delta downloads).
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          retention-days: 30
          if-no-files-found: error

      - name: Upload Windows artifacts (MSI)
        uses: actions/upload-artifact@v7
        with:
          name: electron-windows-x64-msi
          path: release/*.msi
          retention-days: 30
          if-no-files-found: error

      # Opt-in only: a short-retention compatibility copy of the unpacked
      # build tree, useful while Checkpoint R's packaged smoke test (Task 4)
      # is still being built out. Named compat-* (never electron-*) so the
      # release admission gate's `--pattern electron-*` download can never
      # ingest it as a release input.
      - name: Upload unpacked baseline (compat, opt-in)
        if: inputs.retain_unpacked
        uses: actions/upload-artifact@v7
        with:
          name: compat-windows-x64-unpacked-${{ github.sha }}
          path: release/win-unpacked/**
          retention-days: 30
          if-no-files-found: error

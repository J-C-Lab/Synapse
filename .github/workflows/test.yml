name: Test Suite

# ============================================================================
# Test Suite & Build Verification
# ============================================================================
# Runs tests with coverage and builds the electron-vite application.
# This workflow works OUT-OF-THE-BOX without requiring any secrets.
#
# OPTIONAL: Codecov Integration (commented out by default)
#   - CODECOV_TOKEN: Token from codecov.io
# ============================================================================

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Suite
    # The product line ships Windows only (see build-electron.yml's own
    # windows-latest-only build and RELEASE_PROFILE in
    # scripts/release-admission-gate.mjs) — run the suite on the same
    # platform so OS-specific code paths (e.g. command-runner.ts's shell
    # selection) are exercised the way they actually run in production,
    # not on a Linux runner that never ships.
    runs-on: windows-latest

    permissions:
      contents: read
      pull-requests: write
      checks: write

    strategy:
      matrix:
        node-version: [22.13.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.0.8

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm build:packages && pnpm -F @synapsepkg/plugin-cli build

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Run eval ratchet (keyless T0)
        run: pnpm eval

      - name: Generate coverage summary
        if: always()
        shell: bash
        run: |
          echo "## Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -n 10 coverage/lcov-report/index.html | grep -oP '(?<=<div class="pad1">).*?(?=</div>)' | head -1 || echo "Coverage report generated" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      # Optional: Upload coverage to Codecov (requires CODECOV_TOKEN secret)
      # Uncomment the following steps to enable Codecov integration:
      #
      # - name: Upload coverage reports to Codecov
      #   uses: codecov/codecov-action@v4
      #   env:
      #     CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      #   if: ${{ (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') && env.CODECOV_TOKEN != '' }}
      #   with:
      #     token: ${{ env.CODECOV_TOKEN }}
      #     files: ./coverage/lcov.info
      #     flags: unittests
      #     name: codecov-umbrella
      #     fail_ci_if_error: false
      #   continue-on-error: true
      #
      # - name: Code Coverage Report
      #   uses: irongut/CodeCoverageSummary@v1.3.0
      #   if: github.event_name == 'pull_request'
      #   with:
      #     filename: coverage/cobertura-coverage.xml
      #     badge: true
      #     fail_below_min: false
      #     format: markdown
      #     hide_branch_rate: false
      #     hide_complexity: true
      #     indicators: true
      #     output: both
      #     thresholds: '60 80'
      #   continue-on-error: true
      #
      # - name: Add Coverage PR Comment
      #   uses: marocchino/sticky-pull-request-comment@v2
      #   if: github.event_name == 'pull_request'
      #   with:
      #     recreate: true
      #     path: code-coverage-results.md
      #   continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: coverage/junit.xml
          retention-days: 30

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() && github.event_name == 'pull_request'
        with:
          files: |
            coverage/junit.xml
            coverage/eval/t0.junit.xml
          check_name: Test Results
          comment_title: Test Results
        continue-on-error: true

      # NOTE: the electron-vite production build + packaging/bundle-size steps are
      # intentionally disabled pre-release — we are not yet validating packaging in
      # CI. Restore the `pnpm build` step (and the artifact/size steps) before a
      # release milestone. Workspace packages are still built above because the
      # unit suite depends on them.

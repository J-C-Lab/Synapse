name: Release

# ============================================================================
# GitHub Release Creation
# ============================================================================
# Creates a GitHub release when a version tag is pushed.
# Triggers on tags matching v* (e.g., v1.0.0, v2.1.0-beta).
#
# Manual workflow_dispatch is dry-run ONLY — it proves the Windows release
# pipeline without publishing. Tag pushes remain the sole publication route.
#
# This workflow:
# 1. Runs quality checks and tests
# 2. Builds Electron desktop applications for Windows
# 3. Runs the release admission gate (verify, assemble, attest)
# 4. Creates a draft GitHub release from the approved bundle only (tag push)
# ============================================================================

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry-run proof only (must be true — manual dispatch never publishes)
        type: boolean
        required: true
        default: true

concurrency:
  group: release-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

env:
  RELEASE_MODE: ${{ github.event_name == 'workflow_dispatch' && 'dry-run' || 'release' }}
  BUNDLE_ARTIFACT_NAME: ${{ github.event_name == 'workflow_dispatch' && 'release-approved-bundle-dry-run' || 'release-approved-bundle' }}

jobs:
  validate-invocation:
    name: Validate Invocation
    runs-on: ubuntu-latest
    steps:
      - name: Reject non-dry-run manual dispatch
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run != true
        run: |
          echo "::error::workflow_dispatch is dry-run only; set dry_run=true"
          exit 1
      - name: Invocation validated
        run: echo "Invocation validated for ${{ github.event_name }}"

  # Run quality checks first
  quality:
    name: Quality Check
    needs: [validate-invocation]
    uses: ./.github/workflows/quality.yml

  # Run tests
  test:
    name: Test Suite
    needs: [validate-invocation]
    permissions:
      contents: read
      pull-requests: write
      checks: write
    uses: ./.github/workflows/test.yml

  # Build Electron apps for Windows
  build-electron:
    name: Build Electron
    needs: [validate-invocation, quality, test]
    uses: ./.github/workflows/build-electron.yml

  release-admission-gate:
    name: Release Admission Gate
    needs: [validate-invocation, build-electron]
    runs-on: ubuntu-latest
    outputs:
      attestation-url: ${{ steps.attest.outputs.attestation-url }}
    permissions:
      contents: read
      actions: read
      issues: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.0.8
      - uses: actions/setup-node@v6
        with:
          node-version: 22.13.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run release admission gate
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_MODE: ${{ env.RELEASE_MODE }}
          APPLE_CERT_CONFIGURED: ${{ secrets.APPLE_CERTIFICATE != '' }}
          WINDOWS_CERT_CONFIGURED: ${{ secrets.WINDOWS_CERTIFICATE != '' }}
        run: node scripts/release-admission-gate.mjs
      - name: Attest release-approved-bundle
        id: attest
        uses: actions/attest@v4
        with:
          subject-path: release-approved-bundle/assets/*
      - name: Write release body
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          node -e "
            const { buildReleaseBody } = await import('./scripts/release-admission-gate.mjs');
            const fs = await import('node:fs');
            const assetsDir = 'release-approved-bundle/assets';
            const releaseProfile = JSON.parse(fs.readFileSync(assetsDir + '/release-profile.json', 'utf8'));
            const releaseContext = JSON.parse(fs.readFileSync(assetsDir + '/release-context.json', 'utf8'));
            const signingStatus = JSON.parse(fs.readFileSync(assetsDir + '/signing-status.json', 'utf8'));
            const body = buildReleaseBody({
              releaseProfile,
              releaseContext,
              signingStatus,
              attestationUrl: '${{ steps.attest.outputs.attestation-url }}',
              repoOwner: process.env.GITHUB_REPOSITORY_OWNER,
            });
            fs.writeFileSync('release-approved-bundle/release-body.md', body);
          " --input-type=module
      - name: Upload release-approved-bundle
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BUNDLE_ARTIFACT_NAME }}
          path: release-approved-bundle/
          retention-days: 90
          if-no-files-found: error
      - name: Dry-run workflow summary
        if: env.RELEASE_MODE == 'dry-run'
        run: |
          {
            echo "## Dry-run release proof"
            echo ""
            echo "- **Mode**: dry-run (no GitHub release will be created)"
            echo "- **Commit SHA**: \`${{ github.sha }}\`"
            echo "- **Workflow run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- **Package version**: \`$(node -p "require('./package.json').version")\`"
            echo "- **Attestation**: ${{ steps.attest.outputs.attestation-url }}"
            echo "- **Proof artifact**: \`${{ env.BUNDLE_ARTIFACT_NAME }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # Create the GitHub release (tag push only — never workflow_dispatch)
  create-release:
    name: Create Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [validate-invocation, quality, test, build-electron, release-admission-gate]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11.0.8
      - uses: actions/setup-node@v6
        with:
          node-version: 22.13.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Download release-approved-bundle
        uses: actions/download-artifact@v8
        with:
          name: release-approved-bundle
          path: release-approved-bundle/

      - name: Re-verify manifest after download
        run: |
          node -e "
            const { verifyManifest } = await import('./scripts/release-admission-gate.mjs');
            const { createHash } = await import('node:crypto');
            const fs = await import('node:fs');
            const path = await import('node:path');
            const assetsDir = 'release-approved-bundle/assets';
            const manifest = JSON.parse(fs.readFileSync(path.join(assetsDir, 'manifest.json'), 'utf8'));
            const actualFiles = fs.readdirSync(assetsDir)
              .filter((f) => f !== 'manifest.json')
              .map((name) => ({
                name,
                sha512: createHash('sha512').update(fs.readFileSync(path.join(assetsDir, name))).digest('base64'),
              }));
            const result = verifyManifest(manifest, actualFiles);
            if (!result.ok) {
              console.error('re-verification failed:', result.reason);
              process.exit(1);
            }
            console.log('manifest re-verified after download round-trip.');
          " --input-type=module

      - name: Display structure of downloaded files
        run: ls -R release-approved-bundle/

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          body_path: release-approved-bundle/release-body.md
          fail_on_unmatched_files: true
          files: release-approved-bundle/assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

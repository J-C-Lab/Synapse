name: CI/CD Pipeline

# ============================================================================
# CI/CD Pipeline Orchestrator
# ============================================================================
# This is the main CI/CD pipeline that orchestrates smaller, modular workflows.
# Each workflow can also be run independently for better maintainability.
#
# Workflow Structure:
# ├── quality.yml        - Code quality & security checks (ESLint, TypeScript, audit)
# ├── test.yml           - Test suite with coverage & electron-vite build
# ├── build-electron.yml - Electron desktop app build (Windows only) — NOT run
# │                        per-PR right now (see below), still used by release.yml
# └── release.yml        - GitHub release creation (triggered by version tags)
#
# This workflow works OUT-OF-THE-BOX without requiring any secrets.
# See CI_CD.md for detailed setup instructions for optional features.
# ============================================================================
#
# Build Electron is deliberately NOT wired into this per-PR pipeline: pre-release,
# the multi-platform packaging build adds several minutes to every PR for no
# signal anyone acts on. It still runs on every version-tag release (release.yml)
# and can be run on demand via workflow_dispatch on build-electron.yml. Re-add a
# `build-electron` job here (`needs: [quality, test]`) once the project is
# shipping builds people actually download from CI.
# ============================================================================

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Step 1: Code Quality Checks
  quality:
    name: Quality
    uses: ./.github/workflows/quality.yml

  # Step 2: Test Suite & Build
  test:
    name: Test
    permissions:
      contents: read
      pull-requests: write
      checks: write
    uses: ./.github/workflows/test.yml

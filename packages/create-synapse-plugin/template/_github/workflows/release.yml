name: Release

# Tag a version (e.g. `git tag v0.1.0 && git push --tags`) to build the plugin
# and publish the installable .syn (plus its SHA-256) to a GitHub Release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install --no-audit --no-fund

      # `synapse-plugin build` validates synapse.json, bundles the entry, and
      # packs <id>-<version>.syn into the project root.
      - run: npm run build

      - name: Compute SHA-256
        run: |
          for f in *.syn; do
            sha256sum "$f" | tee "$f.sha256"
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.syn
            *.syn.sha256

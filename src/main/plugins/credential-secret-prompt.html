<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Credential</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 16px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        margin: 8px 0;
        padding: 8px;
      }
      .actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 12px;
      }
      button {
        padding: 6px 12px;
      }
    </style>
  </head>
  <body>
    <p id="msg"></p>
    <input id="secret" type="password" autocomplete="off" />
    <div class="actions">
      <button type="button" id="cancel">Cancel</button>
      <button type="button" id="ok">OK</button>
    </div>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const api = window.credentialSecretPrompt
        const secret = document.getElementById("secret")
        const submit = (value) => api.submit(value)
        void api.getContext().then(({ message }) => {
          document.getElementById("msg").textContent = message
          secret.focus()
        })
        document.getElementById("ok").onclick = () => submit(secret.value)
        document.getElementById("cancel").onclick = () => submit(null)
        secret.addEventListener("keydown", (e) => {
          if (e.key === "Enter") submit(secret.value)
          if (e.key === "Escape") submit(null)
        })
      })
    </script>
  </body>
</html>
